<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Chain Reaction: Aegis System</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <style>
        :root {
            --bg: #0d1117; --panel: #161b22; --surface: #21262d; --text: #c9d1d9;
            --border: #30363d; --accent: #238636; --ping-color: #58a6ff; --shadow: rgba(0, 0, 0, 0.4);
        }
        [data-theme="light"] {
            --bg: #ffffff; --panel: #f6f8fa; --surface: #ffffff; --text: #24292f;
            --border: #d0d7de; --accent: #2da44e; --ping-color: #0969da; --shadow: rgba(0, 0, 0, 0.1);
        }
        body { background: var(--bg); color: var(--text); font-family: system-ui, -apple-system, sans-serif; margin: 0; overflow: hidden; transition: background 0.3s, color 0.3s; }
        #app { height: 100dvh; display: flex; flex-direction: column; }
        header { background: var(--panel); border-bottom: 1px solid var(--border); height: 3.5rem; display: flex; align-items: center; justify-content: space-between; padding: 0 1rem; z-index: 100; }
        .dashboard { position: fixed; inset: 0; background: var(--bg); z-index: 1000; padding: 2rem; overflow-y: auto; }
        .control-card { background: var(--panel); border: 1px solid var(--border); padding: 1.5rem; border-radius: 12px; margin-bottom: 1rem; box-shadow: 0 4px 6px var(--shadow); }
        label { display: block; font-size: 0.7rem; font-weight: 800; margin-bottom: 0.5rem; opacity: 0.8; text-transform: uppercase; }
        select { width: 100%; padding: 0.8rem; border-radius: 8px; background: var(--surface); color: var(--text); border: 1px solid var(--border); font-size: 1rem; margin-bottom: 1rem; outline: none; }
        button { padding: 0.8rem 1.2rem; border-radius: 8px; border: 1px solid var(--border); background: var(--surface); color: var(--text); font-weight: 600; cursor: pointer; transition: 0.2s; }
        button.active-toggle { background: var(--accent); color: white; border-color: transparent; }
        button.primary { background: var(--accent); color: white; border: none; font-size: 1.1rem; width: 100%; margin-top: 1rem; }
        .theme-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 0.5rem; margin-bottom: 1rem; }
        .game-area { flex: 1; display: flex; align-items: center; justify-content: center; position: relative; }
        canvas { touch-action: none; border: 1px solid var(--border); border-radius: 8px; background: var(--panel); }
        .cpu-ping { position: absolute; border: 3px solid var(--ping-color); border-radius: 8px; pointer-events: none; z-index: 50; animation: ping 0.5s infinite alternate; box-sizing: border-box; }
        @keyframes ping { from { opacity: 0.4; transform: scale(0.95); } to { opacity: 1; transform: scale(1.05); } }
    </style>
</head>
<body>

<div id="app">
    <header>
        <button @click="showMenu = true">⚙️ SETTINGS</button>
        <div v-if="gameActive" :style="{color: players[turn]?.color, fontWeight: '900'}">
            {{ isThinking ? 'AEGIS EVALUATING...' : players[turn]?.name }}
        </div>
        <div style="width: 80px"></div>
    </header>

    <main class="game-area">
        <div v-if="cpuTarget" class="cpu-ping" :style="cpuTargetStyle"></div>
        <canvas ref="board" @pointerdown="handleInput"></canvas>
    </main>

    <div v-if="showMenu" class="dashboard">
        <div class="control-card">
            <label>Visual Theme</label>
            <div class="theme-grid">
                <button v-for="t in ['system', 'light', 'dark']" :key="t" @click="setTheme(t)" :class="{'active-toggle': settings.theme === t}">{{ t.toUpperCase() }}</button>
            </div>
        </div>
        
        <div class="control-card">
            <label>Game Mode</label>
            <select v-model="settings.mode">
                <option value="pvp">Local Multiplayer</option>
                <option value="cpu">VS Aegis AI (1v1)</option>
            </select>
            
            <div v-if="settings.mode === 'cpu'">
                <label>Difficulty Level</label>
                <select v-model.number="settings.difficulty">
                    <option :value="2">Easy</option>
                    <option :value="3">Medium</option>
                    <option :value="4">Hard</option>
                    <option :value="6">Brutal</option>
                    <option :value="8">Hell (Relative Density)</option>
                </select>
            </div>
        </div>

        <div class="control-card">
            <label>Grid Size</label>
            <select v-model="settings.size"><option value="small">Small</option><option value="medium">Medium</option><option value="large">Large</option></select>
        </div>
        <button class="primary" @click="initGame">START NEW GAME</button>
    </div>
</div>

<script id="worker-script" type="application/javascript">
    const hashValues = new Uint32Array(15 * 15 * 10);
    for (let i = 0; i < hashValues.length; i++) hashValues[i] = Math.floor(Math.random() * 0xFFFFFFFF);
    const transTable = new Map();

    self.onmessage = function(e) {
        const { grid, playerId, rows, cols, difficulty } = e.data;
        const opponentId = (playerId + 1) % 2;
        const startTime = Date.now();
        const TIME_LIMIT = 3500;
        transTable.clear();

        const boardSize = rows * cols;
        const mainBoard = new Int8Array(boardSize * 2);
        let initialHash = 0;

        const updateHash = (h, i, oldOwner, oldAtoms, newOwner, newAtoms) => {
            if (oldOwner !== -1) h ^= hashValues[i * 10 + (oldOwner * 4 + oldAtoms)];
            if (newOwner !== -1) h ^= hashValues[i * 10 + (newOwner * 4 + newAtoms)];
            return h;
        };

        const getLimit = (r, c) => {
            let m = 4; if (r === 0 || r === rows - 1) m--; if (c === 0 || c === cols - 1) m--; return m;
        };

        for(let r=0; r<rows; r++) {
            for(let c=0; c<cols; c++) {
                const i = r * cols + c;
                mainBoard[i*2] = grid[r][c].owner;
                mainBoard[i*2+1] = grid[r][c].atoms;
                if (grid[r][c].owner !== -1) initialHash = updateHash(initialHash, i, -1, 0, grid[r][c].owner, grid[r][c].atoms);
            }
        }

        const simulate = (board, r, c, pid, h) => {
            const next = new Int8Array(board);
            const queue = [r, c];
            let newHash = h;
            while (queue.length > 0) {
                const curC = queue.pop(), curR = queue.pop(), i = curR * cols + curC, idx = i * 2;
                const oldOwner = next[idx], oldAtoms = next[idx+1];
                next[idx] = pid; next[idx+1]++;
                newHash = updateHash(newHash, i, oldOwner, oldAtoms, next[idx], next[idx+1]);
                const limit = getLimit(curR, curC);
                if (next[idx+1] >= limit) {
                    newHash = updateHash(newHash, i, next[idx], next[idx+1], -1, 0);
                    next[idx+1] = 0; next[idx] = -1;
                    if (curR > 0) queue.push(curR - 1, curC);
                    if (curR < rows - 1) queue.push(curR + 1, curC);
                    if (curC > 0) queue.push(curR, curC - 1);
                    if (curC < cols - 1) queue.push(curR, curC + 1);
                }
            }
            return { board: next, hash: newHash };
        };

        const evaluate = (board, pid) => {
            let score = 0, pAtoms = 0, oAtoms = 0;
            const oppId = 1 - pid;

            for (let i = 0; i < boardSize; i++) {
                const owner = board[i*2], atoms = board[i*2+1];
                if (owner === -1) continue;
                
                const r = Math.floor(i/cols), c = i%cols;
                const limit = getLimit(r, c);
                
                // Pure Rule Logic: Value = Proximity to explosion (Density)
                // A corner (limit 2) with 1 atom is 0.5. A center (limit 4) with 1 is 0.25.
                let val = (atoms / limit) * 10; 

                // Vulnerability/Trap Guard (Survival Math)
                let isVulnerable = false;
                const neighbors = [[r-1,c],[r+1,c],[r,c-1],[r,c+1]];
                for(const [nr, nc] of neighbors) {
                    if (nr>=0 && nr<rows && nc>=0 && nc<cols) {
                        const nIdx = (nr * cols + nc) * 2;
                        if (board[nIdx] === (1 - owner) && board[nIdx+1] === getLimit(nr, nc) - 1) {
                            isVulnerable = true; break;
                        }
                    }
                }

                if (isVulnerable) val -= 20; 
                else if (atoms === limit - 1) val += 8;

                if (owner === pid) { pAtoms += atoms; score += val; }
                else { oAtoms += atoms; score -= val; }
            }

            if (oAtoms === 0 && pAtoms > 0) return 1000000;
            if (pAtoms === 0 && oAtoms > 0) return -1000000;
            return score;
        };

        const minimax = (board, depth, isMax, alpha, beta, h) => {
            if (Date.now() - startTime > TIME_LIMIT) return evaluate(board, playerId);
            if (transTable.has(h)) {
                const entry = transTable.get(h);
                if (entry.depth >= depth) return entry.score;
            }
            if (depth === 0) return evaluate(board, playerId);
            
            const curPid = isMax ? playerId : opponentId;
            let best = isMax ? -Infinity : Infinity;
            const moves = [];
            for (let i = 0; i < boardSize; i++) {
                if (board[i*2] === -1 || board[i*2] === curPid) {
                    const r = Math.floor(i/cols), c = i%cols;
                    moves.push({r, c, p: (board[i*2+1] / getLimit(r, c))});
                }
            }
            moves.sort((a, b) => b.p - a.p);

            for (const m of moves) {
                const nextState = simulate(board, m.r, m.c, curPid, h);
                const score = minimax(nextState.board, depth - 1, !isMax, alpha, beta, nextState.hash);
                if (isMax) { best = Math.max(best, score); alpha = Math.max(alpha, best); }
                else { best = Math.min(best, score); beta = Math.min(beta, best); }
                if (beta <= alpha) break;
            }
            transTable.set(h, {score: best, depth: depth});
            return best;
        };

        let finalMove = null;
        const availableMoves = [];
        for (let i = 0; i < boardSize; i++) 
            if (mainBoard[i*2] === -1 || mainBoard[i*2] === playerId) availableMoves.push({r: Math.floor(i/cols), c: i%cols});

        for (let d = 1; d <= difficulty; d++) {
            if (Date.now() - startTime > TIME_LIMIT) break;
            let bestScore = -Infinity, moveAtDepth = null;
            for (const m of availableMoves) {
                if (Date.now() - startTime > TIME_LIMIT) break;
                const nextState = simulate(mainBoard, m.r, m.c, playerId, initialHash);
                const score = minimax(nextState.board, d - 1, false, -Infinity, Infinity, nextState.hash);
                if (score > bestScore) { bestScore = score; moveAtDepth = m; }
            }
            if (moveAtDepth) {
                finalMove = moveAtDepth;
                self.postMessage({ type: 'INTERIM', move: finalMove });
            }
        }
        self.postMessage({ type: 'FINAL', move: finalMove || availableMoves[0] });
    };
</script>

<script>
const { createApp, ref, reactive, onMounted, computed, watch } = Vue;

createApp({
    setup() {
        const board = ref(null);
        const showMenu = ref(true);
        const gameActive = ref(false);
        const isThinking = ref(false);
        const cpuTarget = ref(null);
        const animations = ref([]);

        let currentThinkingWorker = null;
        let watchdogTimer = null;
        let lastBestMove = null;
        const failureCount = ref(0);
        const MAX_RETRYS = 3;

        const settings = reactive({
            mode: JSON.parse(localStorage.getItem('cr_v6'))?.mode || 'cpu',
            difficulty: JSON.parse(localStorage.getItem('cr_v6'))?.difficulty || 4,
            size: JSON.parse(localStorage.getItem('cr_v6'))?.size || 'medium',
            theme: JSON.parse(localStorage.getItem('cr_v6'))?.theme || 'system'
        });

        const turn = ref(0);
        const players = ref([]);
        const grid = ref([]);
        const dims = ref({ r: 0, c: 0 });
        const cellSize = ref(0);
        const hasMoved = ref([]);

        const setTheme = (val) => { settings.theme = val; applyTheme(val); };
        const applyTheme = (t) => {
            let target = t === 'system' ? (window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark') : t;
            document.documentElement.setAttribute('data-theme', target);
        };
        watch(settings, (n) => localStorage.setItem('cr_v6', JSON.stringify(n)), { deep: true });

        const initGame = () => {
            const s = { small: [6,6], medium: [9,6], large: [12,10] }[settings.size];
            dims.value = { r: s[0], c: s[1] };
            players.value = [{ name: 'PLAYER 1', color: '#ff4d4d' }, { name: settings.mode === 'cpu' ? 'AEGIS ENGINE' : 'PLAYER 2', color: '#4d79ff' }];
            hasMoved.value = [false, false];
            grid.value = Array.from({ length: dims.value.r }, () => Array.from({ length: dims.value.c }, () => ({ owner: -1, atoms: 0 })));
            animations.value = [];
            turn.value = 0; gameActive.value = true; showMenu.value = false; failureCount.value = 0;
            setTimeout(resize, 50);
        };

        const handleAIHalt = () => {
            clearAIOrchestration();
            failureCount.value++;
            if (failureCount.value < MAX_RETRYS) runAI();
            else finalizeAIMove(lastBestMove || findFirstValidMove());
        };

        const clearAIOrchestration = () => {
            if (watchdogTimer) clearInterval(watchdogTimer);
            if (currentThinkingWorker) currentThinkingWorker.terminate();
            watchdogTimer = null; currentThinkingWorker = null;
        };

        const findFirstValidMove = () => {
            for (let r=0; r<dims.value.r; r++) for (let c=0; c<dims.value.c; c++) 
                if (grid.value[r][c].owner === -1 || grid.value[r][c].owner === 1) return {r, c};
        };

        const finalizeAIMove = (move) => {
            isThinking.value = false; cpuTarget.value = { x: move.c, y: move.r };
            setTimeout(() => { cpuTarget.value = null; execute(move.r, move.c); }, 600);
        };

        const runAI = () => {
            isThinking.value = true; lastBestMove = null;
            const blob = new Blob([document.getElementById('worker-script').textContent], { type: 'application/javascript' });
            currentThinkingWorker = new Worker(URL.createObjectURL(blob));
            const startTime = Date.now();
            watchdogTimer = setInterval(() => { if (Date.now() - startTime > 4500) handleAIHalt(); }, 200);
            currentThinkingWorker.onmessage = (e) => {
                if (e.data.type === 'INTERIM') lastBestMove = e.data.move;
                else if (e.data.type === 'FINAL') { clearAIOrchestration(); finalizeAIMove(e.data.move); }
            };
            currentThinkingWorker.postMessage({ grid: JSON.parse(JSON.stringify(grid.value)), playerId: 1, rows: dims.value.r, cols: dims.value.c, difficulty: settings.difficulty });
        };

        const resize = () => {
            if (!board.value) return;
            cellSize.value = Math.min((window.innerWidth - 40) / dims.value.c, (window.innerHeight - 150) / dims.value.r, 75);
            board.value.width = dims.value.c * cellSize.value; board.value.height = dims.value.r * cellSize.value;
        };

        const handleInput = (e) => {
            if (!gameActive.value || isThinking.value || animations.value.length > 0) return;
            const rect = board.value.getBoundingClientRect();
            const x = Math.floor((e.clientX - rect.left) / cellSize.value), y = Math.floor((e.clientY - rect.top) / cellSize.value);
            if (y >= 0 && y < dims.value.r && x >= 0 && x < dims.value.c) {
                if (grid.value[y][x].owner === -1 || grid.value[y][x].owner === turn.value) execute(y, x);
            }
        };

        const execute = async (r, c) => {
            grid.value[r][c].owner = turn.value; grid.value[r][c].atoms++;
            hasMoved.value[turn.value] = true;
            await processChain();
            if (checkWin()) return;
            do { turn.value = (turn.value + 1) % 2; } while (hasMoved.value[turn.value] && !isPlayerAlive(turn.value));
            if (settings.mode === 'cpu' && turn.value === 1) runAI();
        };

        const isPlayerAlive = (pid) => {
            for (let r = 0; r < dims.value.r; r++) for (let c = 0; c < dims.value.c; c++) if (grid.value[r][c].owner === pid) return true;
            return false;
        };

        const processChain = async () => {
            let exploding = true;
            while (exploding) {
                exploding = false; const targets = [];
                for (let r = 0; r < dims.value.r; r++) {
                    for (let c = 0; c < dims.value.c; c++) {
                        const cell = grid.value[r][c];
                        let limit = (r === 0 || r === dims.value.r - 1 ? 3 : 4);
                        if (c === 0 || c === dims.value.c - 1) limit--;
                        if (cell.atoms >= limit) { exploding = true; targets.push({ r, c, owner: turn.value }); }
                    }
                }
                if (exploding) {
                    for (const t of targets) {
                        grid.value[t.r][t.c].atoms = 0; grid.value[t.r][t.c].owner = -1;
                        const neighbors = [[t.r-1,t.c],[t.r+1,t.c],[t.r,t.c-1],[t.r,t.c+1]].filter(([nr,nc]) => nr>=0 && nr<dims.value.r && nc>=0 && nc<dims.value.c);
                        neighbors.forEach(([nr, nc]) => { animations.value.push({ sr: t.r, sc: t.c, tr: nr, tc: nc, p: 0, owner: t.owner }); });
                    }
                    await new Promise(res => { const check = setInterval(() => { if (animations.value.length === 0) { clearInterval(check); res(); } }, 16); });
                }
                if (hasMoved.value[0] && hasMoved.value[1]) {
                    if (!isPlayerAlive(0) || !isPlayerAlive(1)) break;
                }
            }
        };

        const checkWin = () => {
            if (!hasMoved.value[0] || !hasMoved.value[1]) return false;
            const p1 = isPlayerAlive(0), p2 = isPlayerAlive(1);
            if (!p1 || !p2) { setTimeout(() => { alert("VICTOR: " + (p1 ? players.value[0].name : players.value[1].name)); gameActive.value = false; showMenu.value = true; }, 200); return true; }
            return false;
        };

        const draw = () => {
            const ctx = board.value?.getContext('2d'); if (!ctx) return requestAnimationFrame(draw);
            ctx.clearRect(0, 0, board.value.width, board.value.height);
            const style = getComputedStyle(document.documentElement); ctx.strokeStyle = style.getPropertyValue('--border').trim();
            for(let i=0; i<=dims.value.c; i++) { ctx.beginPath(); ctx.moveTo(i*cellSize.value, 0); ctx.lineTo(i*cellSize.value, board.value.height); ctx.stroke(); }
            for(let i=0; i<=dims.value.r; i++) { ctx.beginPath(); ctx.moveTo(0, i*cellSize.value); ctx.lineTo(board.value.width, i*cellSize.value); ctx.stroke(); }
            grid.value.forEach((row, r) => row.forEach((cell, c) => {
                if(cell.atoms > 0) {
                    const cx = c*cellSize.value + cellSize.value/2, cy = r*cellSize.value + cellSize.value/2;
                    ctx.fillStyle = players.value[cell.owner]?.color;
                    for(let i=0; i<cell.atoms; i++) {
                        const a = (Date.now()/380) + (i*Math.PI*2/cell.atoms);
                        const d = cell.atoms > 1 ? cellSize.value/6 : 0;
                        ctx.beginPath(); ctx.arc(cx+Math.cos(a)*d, cy+Math.sin(a)*d, cellSize.value/7.5, 0, Math.PI*2); ctx.fill();
                    }
                }
            }));
            for (let i = animations.value.length - 1; i >= 0; i--) {
                const anim = animations.value[i]; anim.p += 0.12;
                if (anim.p >= 1) { grid.value[anim.tr][anim.tc].owner = anim.owner; grid.value[anim.tr][anim.tc].atoms++; animations.value.splice(i, 1); continue; }
                const curX = (anim.sc * cellSize.value + cellSize.value/2) + ((anim.tc - anim.sc) * cellSize.value) * anim.p;
                const curY = (anim.sr * cellSize.value + cellSize.value/2) + ((anim.tr - anim.sr) * cellSize.value) * anim.p;
                ctx.fillStyle = players.value[anim.owner]?.color; ctx.beginPath(); ctx.arc(curX, curY, cellSize.value/7.5, 0, Math.PI*2); ctx.fill();
            }
            requestAnimationFrame(draw);
        };

        onMounted(() => { window.addEventListener('resize', resize); applyTheme(settings.theme); draw(); });
        return { board, settings, showMenu, gameActive, players, turn, isThinking, cpuTarget, handleInput, initGame, setTheme, cpuTargetStyle: computed(() => { if(!cpuTarget.value || !board.value) return {}; return { left: (board.value.offsetLeft + cpuTarget.value.x * cellSize.value) + 'px', top: (board.value.offsetTop + cpuTarget.value.y * cellSize.value) + 'px', width: cellSize.value + 'px', height: cellSize.value + 'px' }; }) };
    }
}).mount('#app');
</script>
</body>
</html>
