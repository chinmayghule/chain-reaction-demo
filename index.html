<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Chain Reaction - Mobile Optimized</title>
    <style>
        :root {
            --bg-color: #0a0a0a;
            --panel-color: #1a1a1a;
        }
        body { 
            background: var(--bg-color); 
            color: white; 
            font-family: 'Segoe UI', system-ui, sans-serif; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: space-between; 
            /* Using dvh for dynamic viewport height */
            height: 100dvh; 
            margin: 0; 
            overflow: hidden; 
            padding: 10px 0;
            box-sizing: border-box;
        }
        #status { 
            font-size: clamp(20px, 5dvh, 28px); 
            font-weight: bold; 
            letter-spacing: 2px; 
            height: 40px;
        }
        canvas { 
            border: 1px solid #444; 
            background: #000; 
            box-shadow: 0 0 20px rgba(0,0,0,1); 
            cursor: pointer;
            /* Ensure canvas doesn't exceed the available space between header and buttons */
            max-height: 70dvh; 
            max-width: 95vw;
            touch-action: none; /* Prevents scrolling while playing */
        }
        .controls { 
            display: flex; 
            gap: 10px; 
            padding-bottom: 5px;
        }
        button { 
            padding: 12px 20px; 
            font-size: 14px; 
            font-weight: bold;
            cursor: pointer; 
            background: var(--panel-color); 
            color: white; 
            border: 1px solid #444; 
            border-radius: 8px; 
            text-transform: uppercase;
        }
        button:active { background: #333; transform: scale(0.95); }
    </style>
</head>
<body>
    <div id="status">PLAYER 1</div>
    <canvas id="gameBoard"></canvas>
    <div class="controls">
        <button onclick="resetGame()">Reset</button>
        <button onclick="newGame()">New Game</button>
    </div>

<script>
const canvas = document.getElementById('gameBoard');
const ctx = canvas.getContext('2d');
const statusDiv = document.getElementById('status');

let ROWS = 9;
let COLS = 6;
let CELL_SIZE = 0;
const colors = ['#00f2ff', '#ff007b', '#00ff44', '#ffff00', '#ff8800', '#cc00ff'];
let currentPlayer = 0;
let playerCount = 2;
let grid = [];
let particles = [];
let isAnimating = false;
let hasMoved = [];
let gameOver = false;

function resizeCanvas() {
    // Dynamically calculate canvas width based on device width
    const availableWidth = window.innerWidth * 0.95;
    const availableHeight = window.innerHeight * 0.7; // 70dvh approximation
    
    // Calculate cell size based on which dimension is more restrictive
    const cellW = availableWidth / COLS;
    const cellH = availableHeight / ROWS;
    CELL_SIZE = Math.min(cellW, cellH, 60); // Cap size for tablet/desktop
    
    canvas.width = COLS * CELL_SIZE;
    canvas.height = ROWS * CELL_SIZE;
}

function initGrid() {
    resizeCanvas();
    grid = [];
    for (let r = 0; r < ROWS; r++) {
        grid[r] = [];
        for (let c = 0; c < COLS; c++) {
            grid[r][c] = { owner: -1, atoms: 0 };
        }
    }
}

function resetGame() {
    initGrid();
    currentPlayer = 0;
    hasMoved = new Array(playerCount).fill(false);
    isAnimating = false;
    gameOver = false;
    particles = [];
    statusDiv.innerText = "PLAYER 1";
    statusDiv.style.color = colors[0];
}

function newGame() {
    const pCount = parseInt(prompt("Players (2-6):", "2"));
    if (isNaN(pCount) || pCount < 2 || pCount > 6) return;

    const sizeInput = prompt("Size:\n1. Small (6x6)\n2. Medium (9x6)\n3. Large (12x10)", "2");
    switch(sizeInput) {
        case "1": COLS = 6; ROWS = 6; break;
        case "2": COLS = 6; ROWS = 9; break;
        case "3": COLS = 10; ROWS = 12; break;
    }
    playerCount = pCount;
    resetGame();
}

class Particle {
    constructor(startX, startY, targetR, targetC, color, owner) {
        this.x = startX; this.y = startY;
        this.targetX = targetC * CELL_SIZE + CELL_SIZE / 2;
        this.targetY = targetR * CELL_SIZE + CELL_SIZE / 2;
        this.targetR = targetR; this.targetC = targetC;
        this.color = color; this.owner = owner;
        this.speed = CELL_SIZE / 6; 
        this.reached = false;
    }
    update() {
        const dx = this.targetX - this.x;
        const dy = this.targetY - this.y;
        const dist = Math.sqrt(dx * dx + dy * dy);
        if (dist < this.speed) { this.x = this.targetX; this.y = this.targetY; this.reached = true; }
        else { this.x += (dx / dist) * this.speed; this.y += (dy / dist) * this.speed; }
    }
    draw() {
        ctx.shadowBlur = 10; ctx.shadowColor = this.color; ctx.fillStyle = this.color;
        ctx.beginPath(); ctx.arc(this.x, this.y, CELL_SIZE/4, 0, Math.PI * 2);
        ctx.fill(); ctx.shadowBlur = 0;
    }
}

function getCriticalMass(r, c) {
    let mass = 4;
    if (r === 0 || r === ROWS - 1) mass--;
    if (c === 0 || c === COLS - 1) mass--;
    return mass;
}

async function handleExplosion(r, c, playerId) {
    if (gameOver) return;
    const cell = grid[r][c];
    if (cell.atoms < getCriticalMass(r, c)) return;

    cell.atoms = 0; cell.owner = -1;
    const neighbors = [[r-1, c], [r+1, c], [r, c-1], [r, c+1]];
    let activeMoves = [];

    for (let [nr, nc] of neighbors) {
        if (nr >= 0 && nr < ROWS && nc >= 0 && nc < COLS) {
            const p = new Particle(c * CELL_SIZE + CELL_SIZE/2, r * CELL_SIZE + CELL_SIZE/2, nr, nc, colors[playerId], playerId);
            particles.push(p); activeMoves.push(p);
        }
    }

    await new Promise(res => {
        const itv = setInterval(() => { if (activeMoves.every(p => p.reached)) { clearInterval(itv); res(); } }, 16);
    });

    for (let p of activeMoves) {
        grid[p.targetR][p.targetC].owner = playerId;
        grid[p.targetR][p.targetC].atoms++;
        particles = particles.filter(item => item !== p);
    }

    // Immediate Win Check
    if (hasMoved.every(m => m)) {
        const owners = new Set();
        for (let row of grid) for (let col of row) if (col.owner !== -1) owners.add(col.owner);
        if (owners.size === 1) {
            const winner = [...owners][0];
            statusDiv.innerText = `WINNER: P${winner + 1}`;
            statusDiv.style.color = colors[winner];
            gameOver = true; isAnimating = false; particles = [];
            return;
        }
    }

    for (let p of activeMoves) if (!gameOver) await handleExplosion(p.targetR, p.targetC, playerId);
}

function gameLoop() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.strokeStyle = '#333';
    for(let i=0; i<=COLS; i++) { ctx.beginPath(); ctx.moveTo(i*CELL_SIZE,0); ctx.lineTo(i*CELL_SIZE, canvas.height); ctx.stroke(); }
    for(let i=0; i<=ROWS; i++) { ctx.beginPath(); ctx.moveTo(0, i*CELL_SIZE); ctx.lineTo(canvas.width, i*CELL_SIZE); ctx.stroke(); }

    for (let r = 0; r < ROWS; r++) {
        for (let c = 0; c < COLS; c++) {
            const cell = grid[r][c];
            if (cell.atoms > 0) {
                ctx.fillStyle = colors[cell.owner];
                const cx = c * CELL_SIZE + CELL_SIZE / 2;
                const cy = r * CELL_SIZE + CELL_SIZE / 2;
                for(let i=0; i<cell.atoms; i++) {
                    const angle = (Date.now() / 600) + (i * (Math.PI * 2 / cell.atoms));
                    const dist = cell.atoms > 1 ? CELL_SIZE/5 : 0;
                    ctx.beginPath();
                    ctx.arc(cx + Math.cos(angle)*dist, cy + Math.sin(angle)*dist, CELL_SIZE/5, 0, Math.PI * 2);
                    ctx.fill();
                }
            }
        }
    }
    particles.forEach(p => { p.update(); p.draw(); });
    requestAnimationFrame(gameLoop);
}

canvas.addEventListener('pointerdown', async (e) => { // Using pointerdown for better mobile response
    if (isAnimating || gameOver) return;
    const rect = canvas.getBoundingClientRect();
    const c = Math.floor((e.clientX - rect.left) / (rect.width / COLS));
    const r = Math.floor((e.clientY - rect.top) / (rect.height / ROWS));
    
    if (r >= 0 && r < ROWS && c >= 0 && c < COLS && (grid[r][c].owner === -1 || grid[r][c].owner === currentPlayer)) {
        isAnimating = true;
        grid[r][c].owner = currentPlayer;
        grid[r][c].atoms++;
        hasMoved[currentPlayer] = true;
        await handleExplosion(r, c, currentPlayer);

        if(!gameOver) {
            do { currentPlayer = (currentPlayer + 1) % playerCount; } 
            while (hasMoved[currentPlayer] && !grid.some(row => row.some(cell => cell.owner === currentPlayer)));
            statusDiv.innerText = `PLAYER ${currentPlayer + 1}`;
            statusDiv.style.color = colors[currentPlayer];
            isAnimating = false;
        }
    }
});

// Handle orientation changes
window.addEventListener('resize', initGrid);

resetGame();
gameLoop();
</script>
</body>
</html>
